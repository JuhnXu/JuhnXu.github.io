<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>自定义战斗卡片制作器 · 皮肤切换版</title>
<style>
:root{
  --bg:#11100f;--panel:#211b16;--panel2:#30261d;--ink:#f7ead0;--muted:#c8b58f;--gold:#caa24a;
  --red:#bc263e;--blue:#2365b5;--green:#2d8a57;--yellow:#d6ad28;--gray:#70767b;--neutral:#202020;
}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% -10%,#3a2b17,#111 48%,#070707);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans SC",sans-serif}
header{padding:20px 24px;border-bottom:1px solid #493621;background:linear-gradient(90deg,#24190f,#101010)}
h1{margin:0;font-size:22px}.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.45}
main{display:grid;grid-template-columns:430px minmax(560px,1fr);gap:16px;padding:16px;align-items:start}.panel{background:linear-gradient(180deg,var(--panel),#151210);border:1px solid #51402b;border-radius:14px;box-shadow:0 10px 30px #0008;padding:15px}h2{font-size:16px;margin:0 0 10px;color:#ffe3a6}.rule{height:1px;background:#51402b;margin:14px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}label{display:block;margin:9px 0 5px;font-size:12px;color:var(--muted)}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid #6b5639;background:#15110e;color:var(--ink);border-radius:9px;padding:8px;outline:none}textarea{min-height:50px;resize:vertical}input[type=color]{height:38px;padding:2px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{border:1px solid #7a6132;border-radius:10px;background:linear-gradient(#59431e,#2d2216);color:#ffe7ad;padding:8px 11px;cursor:pointer}button:hover{filter:brightness(1.15)}.secondary{background:#171412;color:#d8c7a5}.danger{border-color:#7c3b30;background:linear-gradient(#692d25,#2e1514)}.smallBtn{font-size:12px;padding:5px 8px;border-radius:8px}
.cardList{display:flex;flex-direction:column;gap:7px;max-height:220px;overflow:auto}.cardItem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px;border:1px solid #4b3a26;border-radius:10px;background:#17120e}.cardItem.active{border-color:#d6aa42;background:#342516}.cardItem span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tabs{display:flex;gap:6px;margin:10px 0}.tab{padding:8px 10px;border-radius:9px;background:#15110d;border:1px solid #493722;cursor:pointer;color:#cdbb99}.tab.active{background:#5b431d;color:#fff}.halfEditor{display:none}.halfEditor.active{display:block}.help{font-size:12px;line-height:1.55;color:#d4c19d;background:#141110;border:1px dashed #665036;border-radius:10px;padding:10px;margin-top:12px}.previewWrap{display:grid;grid-template-columns:minmax(390px,560px) 220px;gap:16px}.stage{min-height:650px;display:flex;justify-content:center;align-items:center;overflow:auto;border-radius:12px;padding:22px;background:#c69309;background-image:radial-gradient(#4e390b 1px,transparent 1px),linear-gradient(135deg,#e5bc15,#9d6f03);background-size:10px 10px,100%}.printSheet{display:flex;gap:18px;flex-wrap:wrap}.card{width:360px;height:540px;position:relative;overflow:hidden;filter:drop-shadow(0 9px 12px #0009)}
/* 经典横牌皮肤 */
.card.classic{border-radius:20px;background:#111}.card.classic::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,#d8c68e,#f7efd8 30%,#cdbb8e 65%,#f0e3bd);border:5px solid #7c6535;border-radius:20px}.card.classic::after{content:"";position:absolute;inset:10px;border:2px solid #a78a43;border-radius:13px;box-shadow:inset 0 0 0 2px #ead9a6;opacity:.9}.half{position:absolute;left:0;width:100%;height:50%;padding:16px 20px;z-index:2}.half.bottom{top:50%;transform:rotate(180deg);transform-origin:50% 50%}.half.top{top:0}.nameplate{height:36px;margin:0 34px;background:linear-gradient(#836912,var(--cardColor) 38%,var(--cardColor) 66%,#796013);border:2px solid #d0b55d;border-radius:14px;text-align:center;color:#fff3bb;font-weight:900;text-transform:uppercase;line-height:32px;text-shadow:0 2px 2px #000;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.level{position:absolute;top:18px;left:34px;width:34px;height:34px;border-radius:50%;background:#f2ead1;border:3px solid var(--cardColor);color:#111;display:grid;place-items:center;font-weight:900;font-size:19px}.cost{position:absolute;top:26px;right:38px;color:#111;font-weight:900;font-size:22px;text-shadow:0 1px #fff}.cost small{font-size:15px;color:#5f4a24}.armor{position:absolute;top:61px;right:42px;font-weight:800;color:#222}.grid{position:absolute;left:36px;right:36px;top:88px;bottom:24px;display:grid;grid-template-columns:1fr 1.5fr 1fr;grid-template-rows:1fr 1fr;gap:6px}.slot{background:rgba(255,250,234,.55);border:1px solid rgba(132,104,49,.45);display:flex;align-items:center;justify-content:center;gap:5px;color:#2d2418;font-weight:900;position:relative}.slot.center{grid-row:1/3;grid-column:2;background:var(--actionBg);border:2px solid #b79243;flex-direction:column}.actionNum{font-size:42px;line-height:.9}.actionLine{display:flex;align-items:center;gap:6px}.etherBadge{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;background:var(--ether);border:2px solid #f3df9e;font-size:16px}.icon{font-size:23px}.mini{font-size:18px;color:#4b3b28}.circ{font-size:24px}.notes{font-size:10px;font-weight:700;max-width:82px;text-align:center;line-height:1.15}
/* 新竖牌皮肤：中心图片 + 左上半区 + 右倒置下半区 */
.card.beast{border-radius:4px;background:#071226;border:2px solid #c7c3b3;box-shadow:inset 0 0 0 4px #101010,inset 0 0 0 6px #d6d0bf}.beast .art{position:absolute;inset:74px 66px 74px 66px;background:radial-gradient(circle at 50% 42%,rgba(43,129,210,.9),rgba(20,63,124,.78) 42%,rgba(10,21,44,.9));border-left:2px solid #bec7d1;border-right:2px solid #bec7d1;overflow:hidden}.beast .art::before{content:"";position:absolute;inset:0;background:repeating-radial-gradient(ellipse at 42% 40%,rgba(255,255,255,.09) 0 2px,transparent 2px 9px);mix-blend-mode:screen;opacity:.65}.beast .art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.beast .swirl{position:absolute;left:92px;right:92px;top:190px;height:150px;border:14px solid rgba(88,185,238,.75);border-left-color:transparent;border-bottom-color:transparent;border-radius:50%;transform:rotate(-28deg);filter:drop-shadow(0 0 10px #3ac4ff66);pointer-events:none}.beast .topBanner,.beast .bottomBanner{position:absolute;left:22px;right:22px;height:58px;background:linear-gradient(#1d1d1d,#42413c 40%,#121212 78%,#070707);border-top:2px solid #d1c9b3;border-bottom:2px solid #d1c9b3;color:#f5ead0;text-shadow:0 2px #000;font-weight:900;letter-spacing:.02em;z-index:4}.beast .topBanner{top:18px}.beast .bottomBanner{bottom:18px;transform:rotate(180deg)}.beast .bLevel{position:absolute;left:8px;top:8px;width:34px;height:34px;background:#f0f0e4;color:#111;border:2px solid #111;clip-path:polygon(50% 0,100% 27%,100% 73%,50% 100%,0 73%,0 27%);display:grid;place-items:center;font-size:19px}.beast .bName{position:absolute;left:52px;right:50px;top:8px;height:25px;line-height:25px;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}.beast .bSub{position:absolute;left:54px;top:34px;font-size:10px;color:#d4c5a2}.beast .bCost{position:absolute;right:8px;top:10px;font-size:21px}.rail{position:absolute;top:80px;bottom:80px;width:66px;z-index:5;display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:4px 0}.rail.left{left:0}.rail.right{right:0;transform:rotate(180deg)}.gem{min-width:44px;min-height:38px;padding:3px 5px;background:linear-gradient(#ebeee8,#9aa1a8);border:2px solid #2d2f34;color:#111;font-weight:900;font-size:24px;display:flex;align-items:center;justify-content:center;gap:3px;box-shadow:0 2px 0 #fff8 inset,0 2px 4px #0008;clip-path:polygon(18% 0,82% 0,100% 25%,100% 75%,82% 100%,18% 100%,0 75%,0 25%)}.gem.red{background:linear-gradient(#e8445a,#a30e28);color:#fff}.gem.blue{background:linear-gradient(#70a8df,#1f5d9d);color:#fff}.gem.yellow{background:linear-gradient(#f0cc46,#a66f06);color:#111}.gem.green{background:linear-gradient(#5fc07c,#236d45);color:#fff}.gem.gray{background:linear-gradient(#c9cbd0,#6e747c);color:#111}.gem.black{background:linear-gradient(#454545,#101010);color:#fff}.beast .leftMid{position:absolute;left:62px;top:230px;width:44px;height:62px;background:#bf1834;color:#fff;border:2px solid #e6e0d1;border-radius:7px;display:grid;place-items:center;font-weight:900;font-size:26px;z-index:6}.beast .rightMid{position:absolute;right:62px;top:230px;width:44px;height:62px;background:#bf1834;color:#fff;border:2px solid #e6e0d1;border-radius:7px;display:grid;place-items:center;font-weight:900;font-size:26px;z-index:6;transform:rotate(180deg)}.beast .corner{position:absolute;color:#fff;font-size:24px;text-shadow:0 2px #000;z-index:7}.beast .c1{left:5px;top:4px}.beast .c2{right:5px;top:4px}.beast .c3{left:5px;bottom:4px}.beast .c4{right:5px;bottom:4px}.beast .code{position:absolute;left:70px;bottom:61px;font-size:10px;color:#d8d7c8;z-index:6}.beast .code2{position:absolute;right:70px;top:61px;font-size:10px;color:#d8d7c8;z-index:6;transform:rotate(180deg)}
@media(max-width:980px){main{grid-template-columns:1fr}.previewWrap{grid-template-columns:1fr}.stage{min-height:590px}.card{width:320px;height:480px}.grid{left:32px;right:32px}.actionNum{font-size:36px}.beast .art{inset:66px 58px}.rail{top:72px;bottom:72px;width:58px}.gem{min-width:39px;font-size:20px}.beast .leftMid{left:56px}.beast .rightMid{right:56px}}
@media print{body{background:white}header,.editor,.sideTools{display:none!important}main{display:block;padding:0}.panel{border:0;box-shadow:none;background:white}.stage{background:white;padding:0;display:block}.card{break-inside:avoid;page-break-inside:avoid;filter:none}}
</style>
</head>
<body>
<header><h1>自定义战斗卡片制作器 · 皮肤切换版</h1><div class="sub">保留原《Etchinstone》式字段，同时新增“暗色竖牌”皮肤：中间可上传角色图；左侧读取原上半区数据；右侧倒置读取原下半区数据。</div></header>
<main>
<section class="panel editor">
  <h2>卡组</h2><div class="toolbar"><button id="addCard">新增卡片</button><button class="secondary" id="dupCard">复制当前</button><button class="danger" id="delCard">删除当前</button></div><div id="cardList" class="cardList"></div>
  <div class="rule"></div><h2>卡片外观</h2>
  <div class="row"><div><label>卡片标题 / Name</label><input id="cardName"></div><div><label>皮肤</label><select id="skin"><option value="classic">经典横牌</option><option value="beast">暗色竖牌 / 中图</option></select></div></div>
  <div class="row"><div><label>主色</label><input id="cardColor" type="color"></div><div><label>中心图片，暗色竖牌使用</label><input id="artUpload" type="file" accept="image/*"></div></div>
  <div class="toolbar"><button class="secondary" id="clearArt">清除中心图片</button></div>
  <div class="tabs"><div class="tab active" data-half="top">上半区 / 左侧</div><div class="tab" data-half="bottom">下半区 / 右侧倒置</div></div>
  <div id="editors"></div>
  <div class="help">暗色竖牌皮肤中，左侧竖列使用“上半区”字段，右侧竖列使用“下半区”字段并自动倒置；中间图片可上传 PNG/JPG/WebP，会保存在导出的 JSON 中。</div>
  <div class="rule"></div><h2>数据</h2><div class="toolbar"><button id="saveLocal">保存到浏览器</button><button id="loadLocal" class="secondary">读取保存</button><button id="exportJson">导出 JSON</button><label style="margin:0"><input id="importJson" type="file" accept="application/json" style="display:none"><button type="button" onclick="document.getElementById('importJson').click()">导入 JSON</button></label></div>
</section>
<section class="panel"><div class="previewWrap"><div class="stage"><div class="printSheet" id="printSheet"></div></div><div class="sideTools"><h2>输出</h2><div class="toolbar"><button id="printBtn">打印 / 保存 PDF</button><button id="pngBtn">导出当前 PNG</button><button id="svgBtn">导出当前 SVG</button></div><div class="help">打印建议：A4、100% 缩放、开启“背景图形”。PNG/SVG 导出当前选中的卡。</div></div></div></section>
</main>
<script>
const iconMap={move:'↟',attack:'⚔',both:'⚔/↟',enemy:'☠',journey:'⚓',initiative:'↯',boost:'✦',armor:'⬟',none:'—',night:'◐',storm:'☇',hazard:'▰',ambush:'♙',poison:'☠',ranged:'➶',slow:'🐢',freeze:'❄',steep:'⛰',treach:'⚠'};
const colorMap={red:'#bc263e',blue:'#2365b5',green:'#2d8a57',yellow:'#d6ad28',gray:'#70767b',neutral:'#202020'}; const colorClass={red:'red',blue:'blue',green:'green',yellow:'yellow',gray:'gray',neutral:'black'};
let cards=[sampleCard()], current=0, activeHalf='top';
function sampleHalf(level,name,etherColor,neutralNum,etherNum,encIcon,encValue,circ){return {level,name,upgrade:2,upgradeMode:'↻',initiative:2,boost:1,armorValue:2,armorType:'neutral',neutralType:'attack',neutralValue:neutralNum,etherType:'attack',etherValue:etherNum,etherColor,encounterIcon:encIcon,encounterValue:encValue,circumstance:circ,notes:''}}
function sampleCard(){return {name:'MUD SLING',skin:'beast',color:'#1f5d9d',art:'',top:{...sampleHalf(1,'MUD SLING','red',2,6,'enemy',1,'none'),initiative:1,boost:1,armorValue:2,armorType:'gray'},bottom:{...sampleHalf(2,'MUD SLING','blue',3,8,'journey',1,'storm'),initiative:1,boost:1,armorValue:3,armorType:'gray'}}}
function blankCard(){return {name:'NEW ACTION',skin:document.getElementById('skin')?.value||'beast',color:'#1f5d9d',art:'',top:sampleHalf(1,'NEW ACTION','blue',3,5,'enemy',1,'none'),bottom:sampleHalf(2,'NEW ACTION','red',4,6,'journey',1,'none')}}
function el(id){return document.getElementById(id)} function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function numberish(v){return v!==''&&!isNaN(v)?Number(v):v}
function colorOptions(neutral=true){return `${neutral?'<option value="neutral">中立/黑</option>':''}<option value="red">红</option><option value="blue">蓝</option><option value="green">绿</option><option value="yellow">黄</option><option value="gray">灰</option>`}
function renderList(){el('cardList').innerHTML=cards.map((c,i)=>`<div class="cardItem ${i===current?'active':''}" onclick="current=${i};renderAll()"><span>${i+1}. ${escapeHtml(c.name)} · ${c.skin==='beast'?'暗色竖牌':'经典横牌'}</span><button class="smallBtn secondary" onclick="event.stopPropagation();current=${i};renderAll()">编辑</button></div>`).join('')}
function halfEditorHTML(h){return `<div class="halfEditor ${h===activeHalf?'active':''}" data-editor="${h}"><div class="row3"><div><label>等级</label><input type="number" data-k="level" min="1" max="4"></div><div><label>升级费用</label><input type="number" data-k="upgrade" min="0"></div><div><label>升级方式</label><select data-k="upgradeMode"><option>↻</option><option>↺</option><option>⇄</option></select></div></div><div class="row3"><div><label>先攻值</label><input type="number" data-k="initiative"></div><div><label>增益值</label><input type="number" data-k="boost"></div><div><label>护甲值</label><input type="number" data-k="armorValue" min="0"></div></div><div class="row"><div><label>护甲类型</label><select data-k="armorType">${colorOptions()}</select></div><div><label>以太颜色</label><select data-k="etherColor">${colorOptions(false)}</select></div></div><div class="row"><div><label>中立行动类型</label><select data-k="neutralType"><option value="attack">攻击</option><option value="move">移动</option><option value="both">双用</option></select></div><div><label>中立行动数值</label><input type="number" data-k="neutralValue"></div></div><div class="row"><div><label>以太行动类型</label><select data-k="etherType"><option value="attack">攻击</option><option value="move">移动</option><option value="both">双用</option></select></div><div><label>以太行动数值</label><input type="number" data-k="etherValue"></div></div><div class="row3"><div><label>遭遇图标</label><select data-k="encounterIcon"><option value="enemy">敌人</option><option value="journey">旅程</option><option value="none">无</option></select></div><div><label>遭遇编号</label><input type="number" data-k="encounterValue"></div><div><label>情境 / 能力</label><select data-k="circumstance"><option value="none">无</option><option value="night">夜间旅行</option><option value="storm">风暴</option><option value="hazard">危险环境</option><option value="ambush">伏击</option><option value="poison">中毒</option><option value="ranged">远程</option><option value="slow">缓慢</option><option value="freeze">冻结</option><option value="steep">陡峭</option><option value="treach">险恶</option></select></div></div><label>备注小字</label><textarea data-k="notes" placeholder="可写关键词、编号或自定义效果"></textarea></div>`}
function bindEditors(){el('editors').innerHTML=halfEditorHTML('top')+halfEditorHTML('bottom');document.querySelectorAll('[data-k]').forEach(inp=>inp.addEventListener('input',e=>{let h=e.target.closest('.halfEditor').dataset.editor;cards[current][h][e.target.dataset.k]=numberish(e.target.value);renderPreview();renderList()}))}
function loadForm(){let c=cards[current]; el('cardName').value=c.name; el('skin').value=c.skin||'classic'; el('cardColor').value=c.color||'#1f5d9d'; document.querySelectorAll('.halfEditor').forEach(div=>{let h=div.dataset.editor,data=c[h]; div.querySelectorAll('[data-k]').forEach(inp=>inp.value=data[inp.dataset.k]??'')})}
function renderPreview(){let c=cards[current]; el('printSheet').innerHTML=c.skin==='beast'?renderBeast(c):renderClassic(c)}
function renderClassic(c){return `<div class="card classic" id="cardPreview" style="--cardColor:${c.color}">${renderHalf(c.top,'top',c)}${renderHalf(c.bottom,'bottom',c)}</div>`}
function renderHalf(h,pos,c){let ether=colorMap[h.etherColor]||colorMap.red; let actionBg=shade(ether,.75); return `<div class="half ${pos}" style="--ether:${ether};--actionBg:${actionBg}"><div class="nameplate">${escapeHtml(h.name||c.name)}</div><div class="level">${h.level}</div><div class="cost"><small>${h.upgradeMode}</small>${h.upgrade}</div><div class="armor"><span class="icon" style="color:${colorMap[h.armorType]||'#222'}">${iconMap.armor}</span>${h.armorValue}</div><div class="grid"><div class="slot"><span class="icon">${iconMap.initiative}</span>${h.initiative}</div><div class="slot center"><div class="actionLine"><span class="mini">${iconMap[h.neutralType]}</span><span class="actionNum">${h.neutralValue}</span></div><div class="etherBadge">${iconMap[h.etherType]}</div><div class="actionLine"><span class="actionNum">${h.etherValue}</span><span class="mini">${iconMap[h.etherType]}</span></div></div><div class="slot"><span class="circ">${iconMap[h.circumstance]||'—'}</span><span class="notes">${escapeHtml(h.notes||'')}</span></div><div class="slot"><span class="icon">${iconMap.boost}</span>+${h.boost}</div><div class="slot"><span class="icon">${iconMap[h.encounterIcon]}</span>${h.encounterIcon==='none'?'':h.encounterValue}</div></div></div>`}
function renderBeast(c){return `<div class="card beast" id="cardPreview"><div class="corner c1">＋</div><div class="corner c2">＋</div><div class="corner c3">＋</div><div class="corner c4">＋</div><div class="art">${c.art?`<img src="${c.art}">`:''}</div><div class="swirl"></div>${beastBanner(c.top,'topBanner')}${beastBanner(c.bottom,'bottomBanner')}<div class="rail left">${beastRail(c.top)}</div><div class="rail right">${beastRail(c.bottom)}</div><div class="leftMid">${c.top.etherValue}</div><div class="rightMid">${c.bottom.etherValue}</div><div class="code">DOE-A03</div><div class="code2">DOE-A03</div></div>`}
function beastBanner(h,cls){return `<div class="${cls}"><div class="bLevel">${h.level}</div><div class="bName">${escapeHtml(h.name||cards[current].name)}</div><div class="bSub">${iconMap[h.encounterIcon]} ${h.encounterValue||''}　${iconMap[h.circumstance]||''}</div><div class="bCost">${h.upgradeMode}${h.upgrade}</div></div>`}
function beastRail(h){return `<div class="gem gray">${h.initiative}</div><div class="gem ${colorClass[h.etherColor]}">${h.neutralValue}<span style="font-size:14px">${iconMap[h.neutralType]}</span></div><div class="gem ${colorClass[h.armorType]}">${iconMap.armor} ${h.armorValue}</div><div class="gem gray">+${h.boost}</div><div class="gem black">${iconMap[h.encounterIcon]} ${h.encounterIcon==='none'?'':h.encounterValue}</div>`}
function shade(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.round(r*a+255*(1-a));g=Math.round(g*a+255*(1-a));b=Math.round(b*a+255*(1-a));return `rgb(${r},${g},${b})`}
function renderAll(){bindEditors();renderList();loadForm();renderPreview()}
el('cardName').addEventListener('input',e=>{let c=cards[current]; c.name=e.target.value; c.top.name=e.target.value; c.bottom.name=e.target.value; renderList(); renderPreview(); loadForm()});
el('skin').addEventListener('change',e=>{cards[current].skin=e.target.value; renderList(); renderPreview()}); el('cardColor').addEventListener('input',e=>{cards[current].color=e.target.value; renderPreview()});
el('artUpload').addEventListener('change',e=>{let f=e.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=()=>{cards[current].art=r.result; renderPreview()}; r.readAsDataURL(f)}); el('clearArt').onclick=()=>{cards[current].art=''; el('artUpload').value=''; renderPreview()};
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{activeHalf=t.dataset.half;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));document.querySelectorAll('.halfEditor').forEach(x=>x.classList.toggle('active',x.dataset.editor===activeHalf))}));
el('addCard').onclick=()=>{cards.push(blankCard());current=cards.length-1;renderAll()}; el('dupCard').onclick=()=>{cards.splice(current+1,0,JSON.parse(JSON.stringify(cards[current])));current++;renderAll()}; el('delCard').onclick=()=>{if(cards.length>1){cards.splice(current,1);current=Math.max(0,current-1);renderAll()}};
el('saveLocal').onclick=()=>{localStorage.setItem('battleCards.skin.v2',JSON.stringify(cards));alert('已保存到浏览器')}; el('loadLocal').onclick=()=>{let s=localStorage.getItem('battleCards.skin.v2')||localStorage.getItem('battleCards.cn'); if(s){cards=JSON.parse(s); cards.forEach(c=>{c.skin=c.skin||'classic';c.art=c.art||''}); current=0; renderAll()}};
el('exportJson').onclick=()=>download('cards-skin-v2.json',JSON.stringify(cards,null,2),'application/json'); el('importJson').onchange=e=>{let f=e.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=()=>{cards=JSON.parse(r.result); cards.forEach(c=>{c.skin=c.skin||'classic';c.art=c.art||''}); current=0; renderAll()}; r.readAsText(f)};
el('printBtn').onclick=()=>window.print(); el('svgBtn').onclick=()=>download('card.svg',makeSvg(),'image/svg+xml'); el('pngBtn').onclick=()=>{let svg=makeSvg(); let img=new Image(); img.onload=()=>{let canvas=document.createElement('canvas');canvas.width=720;canvas.height=1080;let ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,720,1080);canvas.toBlob(b=>downloadBlob('card.png',b))}; img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg)};
function download(name,text,type){downloadBlob(name,new Blob([text],{type}))} function downloadBlob(name,blob){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}
function makeSvg(){let node=el('cardPreview').cloneNode(true);let css=[...document.styleSheets].map(s=>{try{return [...s.cssRules].map(r=>r.cssText).join('\n')}catch(e){return''}}).join('\n');return `<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1080" viewBox="0 0 360 540"><foreignObject width="360" height="540"><div xmlns="http://www.w3.org/1999/xhtml"><style>${css}</style>${node.outerHTML}</div></foreignObject></svg>`}
renderAll();
</script>
</body></html>
