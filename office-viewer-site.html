<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word / Excel 在线预览</title>
<style>
  body {
    font-family: Arial, "Microsoft YaHei", sans-serif;
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
    background: #f7f7f7;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 4px 18px rgba(0,0,0,.08);
  }
  h1 {
    margin-top: 0;
  }
  .tip {
    color: #666;
    font-size: 14px;
    margin: 10px 0 20px;
  }
  input {
    margin-bottom: 18px;
  }
  #fileInfo {
    margin: 12px 0;
    color: #333;
    font-weight: bold;
  }
  #preview {
    background: #fff;
    border: 1px solid #ddd;
    padding: 20px;
    margin-top: 16px;
    min-height: 320px;
    overflow: auto;
  }
  table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
    background: white;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px 10px;
    white-space: nowrap;
    font-size: 14px;
  }
  th {
    background: #f0f0f0;
    font-weight: bold;
  }
  .sheet-title {
    margin: 22px 0 8px;
    font-size: 18px;
    font-weight: bold;
  }
  .error {
    color: #b00020;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Word / Excel 文件在线预览</h1>
    <div class="tip">支持：.docx、.xlsx、.xls。选择文件后会自动识别类型并显示对应预览。</div>
    <input type="file" id="file" accept=".docx,.xlsx,.xls" />
    <div id="fileInfo"></div>
    <div id="preview">请选择一个 Word 或 Excel 文件</div>
  </div>

  <!-- Word 解析库 -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <!-- Excel 解析库 SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const fileInfo = document.getElementById("fileInfo");

    fileInput.addEventListener("change", async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const fileName = file.name.toLowerCase();
      fileInfo.textContent = "当前文件：" + file.name;
      preview.innerHTML = "正在解析文件...";

      try {
        if (fileName.endsWith(".docx")) {
          await previewWord(file);
        } else if (fileName.endsWith(".xlsx") || fileName.endsWith(".xls")) {
          await previewExcel(file);
        } else {
          preview.innerHTML = '<div class="error">暂不支持该文件类型，请上传 .docx、.xlsx 或 .xls 文件。</div>';
        }
      } catch (err) {
        console.error(err);
        preview.innerHTML = '<div class="error">文件预览失败，请确认文件没有损坏。</div>';
      }
    });

    async function previewWord(file) {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer });
      preview.innerHTML = result.value || "Word 文件没有可显示内容。";
    }

    async function previewExcel(file) {
      const arrayBuffer = await file.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: "array" });

      let html = "";

      workbook.SheetNames.forEach((sheetName) => {
        const sheet = workbook.Sheets[sheetName];

        const tableHtml = XLSX.utils.sheet_to_html(sheet, {
          id: "",
          editable: false
        });

        html += `<div class="sheet-title">工作表：${escapeHtml(sheetName)}</div>`;
        html += tableHtml;
      });

      preview.innerHTML = html || "Excel 文件没有可显示内容。";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
