<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>TTS Lua/XML Editor</title><style>
body{margin:0;font-family:Arial;height:100vh;display:flex;flex-direction:column}#top{padding:10px;background:#333;color:#fff}#main{display:flex;flex:1}#list{width:240px;border-right:1px solid #ccc;overflow:auto}.item{padding:8px;cursor:pointer;border-bottom:1px solid #eee}.item:hover,.active{background:#def}#editor{flex:1;display:flex;flex-direction:column}#tabs{padding:6px;background:#eee}textarea{flex:1;width:100%;border:none;outline:none;font-family:Consolas;font-size:14px;padding:10px;box-sizing:border-box}button{margin-left:8px}.hidden{display:none}
