<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片压缩工具</title>
  <style>
    :root{--bg:#0f172a;--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.12);--text:#f8fafc;--muted:#94a3b8;--line:rgba(255,255,255,.15);--primary:#38bdf8;--primary2:#0284c7;--green:#22c55e;--danger:#fb7185;--warn:#facc15;--shadow:0 24px 80px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 10% 10%,rgba(56,189,248,.22),transparent 30%),radial-gradient(circle at 90% 20%,rgba(168,85,247,.2),transparent 35%),linear-gradient(135deg,#020617,var(--bg));color:var(--text);padding:28px}.app{max-width:1280px;margin:0 auto}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px}.hero h1{margin:0 0 8px;font-size:clamp(30px,5vw,52px);letter-spacing:-.06em}.hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.7}.badge{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:#bae6fd;padding:10px 14px;border-radius:999px;font-size:14px;backdrop-filter:blur(10px)}.layout{display:grid;grid-template-columns:380px 1fr;gap:20px}.panel,.result-panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}.panel{padding:20px;position:sticky;top:20px;height:fit-content}.dropzone{border:2px dashed rgba(148,163,184,.45);border-radius:20px;padding:26px 18px;text-align:center;background:rgba(15,23,42,.45);transition:.2s;cursor:pointer;margin-bottom:18px;display:block}.dropzone.dragover{border-color:var(--primary);background:rgba(56,189,248,.12);transform:translateY(-2px)}.dropzone .icon{font-size:46px;margin-bottom:10px}.dropzone strong{display:block;font-size:18px;margin-bottom:8px}.dropzone span{color:var(--muted);font-size:13px;line-height:1.6}input[type=file]{display:none}.field{margin:18px 0}.field label{display:flex;justify-content:space-between;margin-bottom:9px;font-size:14px;color:#dbeafe}.field small{color:var(--muted)}input[type=range]{width:100%;accent-color:var(--primary)}input[type=number],select{width:100%;border:1px solid var(--line);background:rgba(15,23,42,.8);color:var(--text);padding:12px 13px;border-radius:14px;outline:none;font-size:14px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}button{border:none;border-radius:15px;padding:13px 14px;cursor:pointer;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 12px 30px rgba(14,165,233,.22);transition:.18s}button:hover{transform:translateY(-1px);filter:brightness(1.05)}button.secondary{background:rgba(255,255,255,.12);box-shadow:none;border:1px solid var(--line)}button:disabled{opacity:.5;cursor:not-allowed;transform:none}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.summary-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px}.summary-card span{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.summary-card b{font-size:22px}.result-panel{padding:20px;min-height:520px}.empty{min-height:480px;display:grid;place-items:center;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:20px;background:rgba(15,23,42,.28)}.list{display:grid;gap:14px}.item{display:grid;grid-template-columns:116px 1fr auto;gap:16px;align-items:center;padding:14px;background:rgba(15,23,42,.5);border:1px solid var(--line);border-radius:18px}.thumb{width:116px;height:86px;border-radius:14px;object-fit:cover;background:#020617;border:1px solid var(--line)}.thumb-fallback{display:grid;place-items:center;color:var(--muted);font-size:13px;text-align:center;line-height:1.4;padding:8px}.info h3{margin:0 0 8px;font-size:16px;word-break:break-all;overflow-wrap:anywhere}.meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px;line-height:1.5}.save{color:#bbf7d0;font-weight:700}.error-text{color:#fecdd3}.warn-text{color:#fde68a}.item-actions{display:grid;gap:8px}.download-link{display:inline-block;text-align:center;text-decoration:none;color:white;background:linear-gradient(135deg,var(--green),#16a34a);padding:11px 14px;border-radius:13px;font-size:14px;font-weight:700;white-space:nowrap}.remove-btn,.small-btn{background:rgba(251,113,133,.16);color:#fecdd3;border:1px solid rgba(251,113,133,.28);box-shadow:none;padding:10px 12px;font-size:13px}.small-btn{background:rgba(255,255,255,.1);color:#e0f2fe;border-color:var(--line)}.hint{color:var(--muted);font-size:12px;line-height:1.7;margin-top:14px}.progress-wrap{height:8px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;margin:14px 0 0;display:none}.progress-bar{width:0%;height:100%;background:linear-gradient(90deg,var(--primary),#a78bfa);transition:width .2s}@media(max-width:860px){body{padding:18px}.hero{display:block}.badge{display:inline-block;margin-top:14px}.layout{grid-template-columns:1fr}.panel{position:static}.summary{grid-template-columns:1fr}.item{grid-template-columns:96px 1fr}.thumb{width:96px;height:76px}.item-actions{grid-column:1/-1;grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero"><div><h1>图片压缩工具</h1><p>纯前端本地压缩，不上传服务器。这个版本会先读取图片文件头，再按目标尺寸解码，适合 100MB+ 的大 PNG/JPG。</p></div><div class="badge">Local · Header Detect · Large Image</div></section>
    <section class="layout">
      <aside class="panel">
        <label id="dropzone" class="dropzone" for="fileInput"><div class="icon">🖼️</div><strong>点击选择或拖拽图片</strong><span>支持多选：JPG / PNG / WebP / GIF / BMP</span></label>
        <input id="fileInput" type="file" accept="image/*,.jpg,.jpeg,.png,.webp,.gif,.bmp" multiple />
        <div class="field"><label><span>压缩质量</span><small><b id="qualityText">75</b>%</small></label><input id="quality" type="range" min="10" max="100" value="75" /></div>
        <div class="field"><label for="format">输出格式</label><select id="format"><option value="image/jpeg">JPG，体积更小</option><option value="image/webp">WebP，更高压缩率</option><option value="image/png">PNG，保留透明</option></select></div>
        <div class="grid-2"><div class="field"><label for="maxWidth">最大宽度</label><input id="maxWidth" type="number" min="0" value="1920" placeholder="0为不限制" /></div><div class="field"><label for="maxHeight">最大高度</label><input id="maxHeight" type="number" min="0" value="1920" placeholder="0为不限制" /></div></div>
        <div class="actions"><button id="compressBtn">开始压缩</button><button id="clearBtn" class="secondary">清空</button></div>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <p class="hint">说明：如果 PNG 文件本身损坏、实际不是图片，或者浏览器不支持该编码，仍会失败。遇到超大图，建议把最大宽高先设为 1280 或 1920。</p>
      </aside>
      <section><div class="summary"><div class="summary-card"><span>图片数量</span><b id="count">0</b></div><div class="summary-card"><span>原始大小</span><b id="originSize">0 KB</b></div><div class="summary-card"><span>压缩后</span><b id="compressedSize">0 KB</b></div></div><div class="result-panel"><div id="empty" class="empty"><div><h2>还没有图片</h2><p>上传图片后，压缩结果会显示在这里。</p></div></div><div id="list" class="list"></div></div></section>
    </section>
  </main>
<script>
const $=id=>document.getElementById(id);const fileInput=$('fileInput'),dropzone=$('dropzone'),quality=$('quality'),qualityText=$('qualityText'),format=$('format'),maxWidth=$('maxWidth'),maxHeight=$('maxHeight'),compressBtn=$('compressBtn'),clearBtn=$('clearBtn'),list=$('list'),empty=$('empty'),count=$('count'),originSize=$('originSize'),compressedSize=$('compressedSize'),progressWrap=$('progressWrap'),progressBar=$('progressBar');
const MAX_OUTPUT_PIXELS=40000000;let selectedFiles=[],compressedItems=[],previewUrls=[];
quality.oninput=()=>qualityText.textContent=quality.value;fileInput.onchange=e=>{addFiles(e.target.files);fileInput.value=''};['dragenter','dragover'].forEach(t=>dropzone.addEventListener(t,e=>{e.preventDefault();dropzone.classList.add('dragover')}));['dragleave','drop'].forEach(t=>dropzone.addEventListener(t,e=>{e.preventDefault();dropzone.classList.remove('dragover')}));dropzone.addEventListener('drop',e=>addFiles(e.dataTransfer.files));compressBtn.onclick=compressAll;clearBtn.onclick=clearAll;
function addFiles(files){const imgs=Array.from(files).filter(f=>f.type.startsWith('image/')||/\.(jpe?g|png|webp|gif|bmp)$/i.test(f.name||''));if(!imgs.length&&files.length){alert('没有识别到图片文件');return}selectedFiles=selectedFiles.concat(imgs);renderPending();updateSummary()}
function clearAll(){revokePreviewUrls();compressedItems.forEach(i=>URL.revokeObjectURL(i.url));selectedFiles=[];compressedItems=[];list.innerHTML='';empty.style.display='grid';progressWrap.style.display='none';progressBar.style.width='0%';updateSummary()}
function revokePreviewUrls(){previewUrls.forEach(u=>URL.revokeObjectURL(u));previewUrls=[]}
function renderPending(){empty.style.display=(selectedFiles.length||compressedItems.length)?'none':'grid';list.innerHTML='';revokePreviewUrls();selectedFiles.forEach((file,index)=>{const url=URL.createObjectURL(file);previewUrls.push(url);const el=document.createElement('article');el.className='item';el.innerHTML=`<img class="thumb" src="${url}" alt="${esc(file.name)}" loading="lazy"><div class="info"><h3>${esc(file.name)}</h3><div class="meta"><span>原图：${bytes(file.size)}</span><span>状态：等待压缩</span><span>类型：${esc(file.type||'未知，压缩时自动识别')}</span></div></div><div class="item-actions"><button class="remove-btn" data-index="${index}">移除</button></div>`;const img=el.querySelector('img');img.onerror=()=>img.replaceWith(fallback('预览失败\n仍可尝试压缩'));list.appendChild(el)});list.querySelectorAll('.remove-btn').forEach(btn=>btn.onclick=()=>{selectedFiles.splice(Number(btn.dataset.index),1);renderPending();updateSummary()})}
async function compressAll(){if(!selectedFiles.length){alert('请先选择图片');return}compressBtn.disabled=true;progressWrap.style.display='block';progressBar.style.width='0%';compressedItems.forEach(i=>URL.revokeObjectURL(i.url));compressedItems=[];list.innerHTML='';empty.style.display='none';revokePreviewUrls();for(let i=0;i<selectedFiles.length;i++){const file=selectedFiles[i];renderProcessing(file,i);await frame();try{const result=await compressImage(file,{quality:Number(quality.value)/100,mimeType:format.value,maxWidth:Number(maxWidth.value)||0,maxHeight:Number(maxHeight.value)||0});compressedItems.push(result);replaceSlot(i,compressedNode(result,compressedItems.length-1))}catch(err){replaceSlot(i,errorNode(file,err))}progressBar.style.width=Math.round((i+1)/selectedFiles.length*100)+'%';updateSummary();await frame()}compressBtn.disabled=false}
async function compressImage(file,opt){const buf=await file.arrayBuffer();const meta=readImageMeta(buf,file);if(!meta.mime)throw new Error('文件头不是常见图片格式，可能并不是有效图片');if(!meta.width||!meta.height)throw new Error('无法从文件头读取图片尺寸，可能文件损坏或格式特殊');let size=calc(meta.width,meta.height,opt.maxWidth,opt.maxHeight);const pixels=size.width*size.height;if(pixels>MAX_OUTPUT_PIXELS){const r=Math.sqrt(MAX_OUTPUT_PIXELS/pixels);size={width:Math.max(1,Math.floor(size.width*r)),height:Math.max(1,Math.floor(size.height*r))}}
 const blobForDecode=new Blob([buf],{type:meta.mime});const source=await decodeBlob(blobForDecode,size);const canvas=document.createElement('canvas');canvas.width=size.width;canvas.height=size.height;const ctx=canvas.getContext('2d',{alpha:opt.mimeType!=='image/jpeg',willReadFrequently:false});if(!ctx){closeSource(source);throw new Error('Canvas 初始化失败')}ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';if(opt.mimeType==='image/jpeg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height)}try{ctx.drawImage(source,0,0,size.width,size.height)}catch(e){closeSource(source);throw new Error('图片绘制失败，建议把最大宽高调低到 1280 后重试')}closeSource(source);const out=await toBlob(canvas,opt.mimeType,opt.quality);if(!out)throw new Error('当前浏览器不支持该输出格式');const url=URL.createObjectURL(out);return{originalFile:file,blob:out,url,filename:`${removeExt(file.name)}-compressed.${ext(opt.mimeType)}`,width:size.width,height:size.height,originWidth:meta.width,originHeight:meta.height,mime:meta.mime,autoLimited:pixels>MAX_OUTPUT_PIXELS}}
async function decodeBlob(blob,size){if('createImageBitmap' in window){try{return await createImageBitmap(blob,{imageOrientation:'from-image',resizeWidth:size.width,resizeHeight:size.height,resizeQuality:'high'})}catch(e){try{return await createImageBitmap(blob)}catch(_){}}}return new Promise((resolve,reject)=>{const u=URL.createObjectURL(blob),img=new Image();img.decoding='async';img.onload=()=>{URL.revokeObjectURL(u);resolve(img)};img.onerror=()=>{URL.revokeObjectURL(u);reject(new Error('浏览器无法解码这张图片；可能图片损坏、编码特殊，或分辨率过大'))};img.src=u})}
function readImageMeta(buf,file){const v=new DataView(buf),u=new Uint8Array(buf),name=file.name||'';const sig=(...a)=>a.every((n,i)=>u[i]===n);if(buf.byteLength>=24&&sig(0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A))return{mime:'image/png',width:v.getUint32(16),height:v.getUint32(20)};if(buf.byteLength>=10&&sig(0x47,0x49,0x46))return{mime:'image/gif',width:v.getUint16(6,true),height:v.getUint16(8,true)};if(buf.byteLength>=30&&sig(0x42,0x4D))return{mime:'image/bmp',width:Math.abs(v.getInt32(18,true)),height:Math.abs(v.getInt32(22,true))};if(buf.byteLength>=30&&sig(0x52,0x49,0x46,0x46)&&String.fromCharCode(...u.slice(8,12))==='WEBP'){const kind=String.fromCharCode(...u.slice(12,16));if(kind==='VP8X')return{mime:'image/webp',width:1+u[24]+(u[25]<<8)+(u[26]<<16),height:1+u[27]+(u[28]<<8)+(u[29]<<16)};if(kind==='VP8L')return{mime:'image/webp',width:1+(((u[22]&0x3F)<<8)|u[21]),height:1+(((u[24]&0x0F)<<10)|(u[23]<<2)|((u[22]&0xC0)>>6))};if(kind==='VP8 ')return{mime:'image/webp',width:v.getUint16(26,true)&0x3fff,height:v.getUint16(28,true)&0x3fff};return{mime:'image/webp'}};if(buf.byteLength>=4&&sig(0xFF,0xD8)){let off=2;while(off<buf.byteLength){while(u[off]===0xFF)off++;const marker=u[off++];if(marker===0xD9||marker===0xDA)break;const len=v.getUint16(off);if(len<2)break;if((marker>=0xC0&&marker<=0xC3)||(marker>=0xC5&&marker<=0xC7)||(marker>=0xC9&&marker<=0xCB)||(marker>=0xCD&&marker<=0xCF))return{mime:'image/jpeg',width:v.getUint16(off+6),height:v.getUint16(off+4)};off+=len}return{mime:'image/jpeg'}};return{mime:file.type&&file.type.startsWith('image/')?file.type:guessMime(name)}}
function guessMime(n){if(/\.png$/i.test(n))return'image/png';if(/\.jpe?g$/i.test(n))return'image/jpeg';if(/\.webp$/i.test(n))return'image/webp';if(/\.gif$/i.test(n))return'image/gif';if(/\.bmp$/i.test(n))return'image/bmp';return''}
function toBlob(canvas,mime,q){return new Promise(res=>canvas.toBlob?canvas.toBlob(res,mime,q):res(null))}function calc(w,h,mw,mh){let nw=w,nh=h;if(mw>0&&nw>mw){nh=Math.round(nh*mw/nw);nw=mw}if(mh>0&&nh>mh){nw=Math.round(nw*mh/nh);nh=mh}return{width:Math.max(1,Math.round(nw)),height:Math.max(1,Math.round(nh))}}function closeSource(s){if(s&&typeof s.close==='function')s.close()}
function renderProcessing(file,i){const el=document.createElement('article');el.className='item';el.dataset.slot=i;el.innerHTML=`<div class="thumb thumb-fallback">处理中</div><div class="info"><h3>${esc(file.name)}</h3><div class="meta"><span>原图：${bytes(file.size)}</span><span>状态：读取文件头并压缩</span></div></div>`;list.appendChild(el)}function replaceSlot(i,node){const old=list.querySelector(`[data-slot="${i}"]`);old?old.replaceWith(node):list.appendChild(node)}
function compressedNode(item,idx){const origin=item.originalFile.size,after=item.blob.size,saved=origin?Math.round((1-after/origin)*100):0;const el=document.createElement('article');el.className='item';el.innerHTML=`<img class="thumb" src="${item.url}" alt="${esc(item.filename)}"><div class="info"><h3>${esc(item.originalFile.name)}</h3><div class="meta"><span>原图：${bytes(origin)}</span><span>压缩后：${bytes(after)}</span><span>尺寸：${item.width} × ${item.height}</span><span>源格式：${esc(item.mime)}</span><span class="save">${saved>=0?'节省：'+saved+'%':'增大：'+Math.abs(saved)+'%'}</span>${item.autoLimited?'<span class="warn-text">已自动限制输出像素</span>':''}</div></div><div class="item-actions"><a class="download-link" href="${item.url}" download="${esc(item.filename)}">下载图片</a><button class="remove-btn">删除</button></div>`;el.querySelector('button').onclick=()=>{URL.revokeObjectURL(item.url);compressedItems.splice(idx,1);el.remove();updateSummary();if(!compressedItems.length)empty.style.display='grid'};return el}
function errorNode(file,err){const el=document.createElement('article');el.className='item';el.innerHTML=`<div class="thumb thumb-fallback" style="color:#fb7185">失败</div><div class="info"><h3>${esc(file.name)}</h3><div class="meta"><span>原图：${bytes(file.size)}</span><span class="error-text">原因：${esc(err.message||'未知错误')}</span></div></div><div class="item-actions"><button class="small-btn" type="button">建议：确认文件可打开，或调低最大宽高</button></div>`;return el}
function fallback(t){const d=document.createElement('div');d.className='thumb thumb-fallback';d.textContent=t;return d}function updateSummary(){originSize.textContent=bytes(selectedFiles.reduce((s,f)=>s+f.size,0));compressedSize.textContent=bytes(compressedItems.reduce((s,i)=>s+i.blob.size,0));count.textContent=selectedFiles.length}function bytes(b){if(!b)return'0 KB';const u=['B','KB','MB','GB'];let s=b,i=0;while(s>=1024&&i<u.length-1){s/=1024;i++}return`${s.toFixed(s>=10||i===0?0:1)} ${u[i]}`}function ext(m){return m==='image/webp'?'webp':m==='image/png'?'png':'jpg'}function removeExt(n){return(n||'image').replace(/\.[^.]+$/,'')||'image'}function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function frame(){return new Promise(r=>requestAnimationFrame(r))}
</script>
</body>
</html>
