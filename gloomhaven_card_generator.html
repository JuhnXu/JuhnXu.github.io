<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幽港风行动卡生成器</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#1c1b22;
    color:white;
    margin:0;
    padding:20px;
}
.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.panel{
    flex:1;
    min-width:320px;
}
textarea{
    width:100%;
    height:500px;
    background:#101014;
    color:#e6e6e6;
    border:1px solid #444;
    padding:10px;
    font-size:14px;
    border-radius:8px;
}
button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#7856ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}
.preview{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    width:320px;
    height:500px;
    background:#efe7d2;
    color:#111;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    border:4px solid #3d314f;
    position:relative;
}

.header{
    background:#2d2340;
    color:white;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.initiative{
    font-size:32px;
    font-weight:bold;
    color:#ffd85b;
}

.section{
    padding:14px;
}

.top{
    height:185px;
    border-bottom:3px solid #3d314f;
}

.bottom{
    height:185px;
}

.section h3{
    margin-top:0;
    margin-bottom:8px;
    color:#2d2340;
}

.effect{
    margin-bottom:6px;
    line-height:1.4;
}

.loss{
    color:#a50000;
    font-weight:bold;
}

.tags{
    position:absolute;
    bottom:10px;
    right:12px;
    font-size:12px;
    color:#555;
}

@media print{
    body{
        background:white;
    }
    .panel{
        display:none;
    }
    .preview{
        gap:0;
    }
    .card{
        page-break-inside:avoid;
        margin:8px;
    }
}
</style>
</head>
<body>

<h1>幽港风行动卡生成器</h1>

<div class="container">

<div class="panel">
<h2>输入 JSON</h2>

<textarea id="jsonInput">
[
  {
    "name":"暗月祷言",
    "initiative":18,
    "top":{
      "title":"上半",
      "effects":[
        "攻击2",
        "施加：虚弱",
        "若目标位于暗影：攻击改为4"
      ]
    },
    "bottom":{
      "title":"下半",
      "effects":[
        "治疗2",
        "邻近盟友获得护盾1"
      ]
    },
    "tags":["治疗","暗影"]
  },
  {
    "name":"莎尔之拥",
    "initiative":11,
    "top":{
      "title":"上半",
      "effects":[
        "范围3",
        "攻击3",
        "黑暗",
        "诅咒",
        "LOSS"
      ]
    },
    "bottom":{
      "title":"下半",
      "effects":[
        "隐形",
        "移动2"
      ]
    },
    "tags":["控制","LOSS"]
  }
]
</textarea>

<button onclick="generateCards()">生成卡牌</button>
<button onclick="window.print()">打印 / 导出 PDF</button>

</div>

<div class="panel">
<h2>预览</h2>
<div id="preview" class="preview"></div>
</div>

</div>

<script>
function createEffectHTML(effect){
    if(effect.toUpperCase().includes("LOSS")){
        return `<div class="effect loss">${effect}</div>`;
    }
    return `<div class="effect">${effect}</div>`;
}

function generateCards(){
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    let cards;

    try{
        cards = JSON.parse(document.getElementById("jsonInput").value);
    }catch(e){
        alert("JSON 格式错误");
        return;
    }

    cards.forEach(card => {

        const topEffects = card.top.effects.map(createEffectHTML).join("");
        const bottomEffects = card.bottom.effects.map(createEffectHTML).join("");

        const tags = (card.tags || []).join(" · ");

        const html = `
        <div class="card">

            <div class="header">
                <div class="title">${card.name}</div>
                <div class="initiative">${card.initiative}</div>
            </div>

            <div class="section top">
                <h3>${card.top.title}</h3>
                ${topEffects}
            </div>

            <div class="section bottom">
                <h3>${card.bottom.title}</h3>
                ${bottomEffects}
            </div>

            <div class="tags">${tags}</div>

        </div>
        `;

        preview.innerHTML += html;
    });
}

generateCards();
</script>

</body>
</html>
