

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多图合成 A4 PDF</title>
<style>
:root{
  --bg:#171923;
  --panel:#222533;
  --panel2:#2b3042;
  --text:#f5f7fb;
  --muted:#aeb6c8;
  --accent:#7c5cff;
  --danger:#ff3b3b;
  --paper:#fff;
  --line:#d8dbe6;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#11131b,#232638);color:var(--text)}
.app{display:grid;grid-template-columns:360px 1fr;min-height:100vh}
aside{padding:22px;background:rgba(20,22,32,.92);border-right:1px solid rgba(255,255,255,.08);position:sticky;top:0;height:100vh;overflow:auto}
main{padding:24px;overflow:auto}
h1{font-size:24px;margin:0 0 8px}.sub{color:var(--muted);line-height:1.6;margin:0 0 18px;font-size:14px}
.panel{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 7px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
input[type="number"],select{width:100%;background:#121520;color:var(--text);border:1px solid #3b4156;border-radius:10px;padding:11px 12px;font-size:15px;outline:none}
input[type="checkbox"]{transform:scale(1.1);margin-right:8px}
button,.fileBtn{width:100%;border:0;border-radius:12px;padding:13px 14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;display:block;text-align:center}
button:hover,.fileBtn:hover{filter:brightness(1.08);transform:translateY(-1px)}
button.secondary{background:#394052}.danger{background:#c73f3f!important}.mini{padding:8px 10px;font-size:13px;border-radius:9px}
#fileInput{display:none}.hint{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}.stats{font-size:13px;color:#dce2f2;line-height:1.8}
.drop{border:2px dashed #596179;border-radius:18px;background:rgba(255,255,255,.035);padding:26px;text-align:center;margin-bottom:20px;transition:.15s}.drop.dragover{border-color:var(--accent);background:rgba(124,92,255,.12)}
.drop strong{display:block;font-size:18px;margin-bottom:8px}.drop span{color:var(--muted);font-size:14px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px}.toolbar .left{display:flex;gap:10px;flex-wrap:wrap}.toolbar button{width:auto;min-width:128px}
.pages{display:flex;flex-direction:column;gap:24px;align-items:center}
.pageWrap{display:flex;gap:14px;align-items:flex-start;--zoom:1}.pageNum{min-width:72px;color:var(--muted);font-size:13px;padding-top:10px;text-align:right}
.sheet{width:calc(210mm * var(--zoom));height:calc(297mm * var(--zoom));position:relative;flex:0 0 auto}
.a4{width:210mm;height:297mm;background:var(--paper);position:relative;box-shadow:0 12px 45px rgba(0,0,0,.35);overflow:hidden;color:#111;display:grid;gap:0}
.slot{position:relative;border:.15mm solid var(--line);overflow:hidden;background:#fafafa;display:flex;align-items:center;justify-content:center}
.slot.empty::after{content:"空";font-size:11px;color:#bbb}.slot img{width:100%;height:100%;object-fit:contain;display:block;background:#fff;user-select:none;-webkit-user-drag:none}
.bleed .slot::before{content:"";position:absolute;inset:2mm;border:.35mm dashed var(--danger);z-index:3;pointer-events:none}.bleed .slot::after{content:"";position:absolute;inset:0;border:.2mm solid rgba(255,0,0,.65);z-index:3;pointer-events:none}
.thumbGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.thumb{height:78px;border-radius:10px;overflow:hidden;position:relative;background:#111;border:1px solid #3d4356}.thumb img{width:100%;height:100%;object-fit:cover}.thumb b{position:absolute;left:5px;top:5px;background:rgba(0,0,0,.65);font-size:11px;border-radius:999px;padding:2px 6px}.thumb button{position:absolute;right:4px;top:4px;width:24px;height:24px;padding:0;border-radius:50%;background:rgba(200,45,45,.9);font-size:14px}
.printOnly{display:none}
@media(max-width:980px){.app{grid-template-columns:1fr}aside{position:static;height:auto}.pageWrap{flex-direction:column}.pageNum{text-align:left}}
@page{size:A4 portrait;margin:0}
@media print{
  html,body{width:210mm!important;min-height:297mm!important;height:auto!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .app{display:block!important;width:210mm!important;margin:0!important;padding:0!important}
  aside,.drop,.toolbar,.pageNum{display:none!important}
  main{display:block!important;width:210mm!important;margin:0!important;padding:0!important;overflow:visible!important}
  .pages{display:block!important;width:210mm!important;margin:0!important;padding:0!important;gap:0!important;align-items:stretch!important}
  .pageWrap{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;break-after:page;page-break-after:always;overflow:hidden!important}
  .pageWrap:last-child{break-after:auto;page-break-after:auto}
  .sheet{display:block!important;width:210mm!important;height:297mm!important;max-width:none!important;aspect-ratio:auto!important;margin:0!important;padding:0!important;overflow:hidden!important}
  .a4{transform:none!important;}
  .a4{width:210mm!important;height:290mm!important;max-width:none!important;aspect-ratio:auto!important;box-shadow:none!important;margin:0!important;padding:0!important;transform:none!important;break-inside:avoid!important;page-break-inside:avoid!important;overflow:hidden!important}
  .pages{display:block!important;width:210mm!important;margin:0!important;padding:0!important}
  .pageWrap{
    display:block!important;
    width:210mm!important;
    height:290mm!important;
    margin:0!important;
    padding:0!important;
    break-after:auto!important;
    page-break-after:auto!important;
    overflow:hidden!important;
  }
  .pageWrap:last-child{
    break-after:auto!important;
    page-break-after:auto!important;
  }
  .sheet{
    width:210mm!important;
    height:290mm!important;
    margin:0!important;
    transform:none!important;
    overflow:hidden!important;
  }
  .slot{border:.12mm solid #ddd}
  .bleed .slot::before{border-color:red}
  .bleed .slot::after{border-color:red}
}
#printBtn,#btnPrint{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>多图合成 A4 PDF</h1>
    <p class="sub">上传多张卡面图片，输入 A4 上横向放几个、纵向放几个，自动按格子铺满、居中裁切，方便打印。</p>

    <div class="panel">
      <label class="fileBtn" for="fileInput">点击上传图片</label>
      <input id="fileInput" type="file" accept="image/jpeg,image/jpg,image/png,image/bmp,image/webp" multiple>
      <p class="hint">支持 jpg、png、jpeg、bmp、webp，可一次选择多张，也可以拖到右侧 A4 预览区。</p>
    </div>

    <div class="panel">
      <div class="row">
        <div><label>横向几个</label><input id="cols" type="number" min="1" max="10" value="3"></div>
        <div><label>纵向几个</label><input id="rows" type="number" min="1" max="14" value="3"></div>
      </div>
      <div class="row">
        <div><label>每张图片份数</label><input id="copies" type="number" min="1" max="99" value="1"></div>
        <div><label>预览缩放</label><select id="zoom"><option value="0.45">45%</option><option value="0.55" selected>55%</option><option value="0.7">70%</option><option value="1">100%</option></select></div>
      </div>
      <label><input id="showBleed" type="checkbox" checked>显示红色出血线</label>
      <p class="hint">无需输入实体尺寸：卡片尺寸会由 A4 页面自动均分。可选择铺满(Cover)或完整显示(Contain)，完整显示会自动留白避免裁切。</p>
    </div>

    <div class="panel stats" id="stats">未上传图片</div>

    <div class="panel">
      <button id="printBtn" style="display:none"></button>
      <div style="height:10px"></div>
      <button class="secondary" id="exportZipBtn">下载分页图片 ZIP</button>
      <div style="height:10px"></div>
      <button class="secondary" id="clearBtn">清空图片</button>
    </div>

    <div class="panel">
      <b>已上传图片</b>
      <div id="thumbGrid" class="thumbGrid"></div>
    </div>
  </aside>

  <main>
    <div id="drop" class="drop">
      <strong>把图片拖到这里或下方 A4 预览区</strong>
      <span>上传后会按 横向 × 纵向 自动分页排版</span>
    </div>
    <div class="toolbar">
      <div class="left">
        <button class="secondary mini" id="fitBtn">适合屏幕</button>
        <button class="secondary mini" id="actualBtn">100% 预览</button>
      </div>
      <span class="hint">导出 PDF：点击“”，纸张选择 A4，边距选择“无”。</span>
    </div>
    <div id="pages" class="pages"></div>
  </main>
</div>

<script>
const A4_W = 210, A4_H = 297;
let images = [];
const $ = id => document.getElementById(id);
const supported = ['image/jpeg','image/png','image/bmp','image/webp'];

function readFiles(fileList){
  const files = [...fileList].filter(f => supported.includes(f.type) || /\.(jpe?g|png|bmp|webp)$/i.test(f.name));
  if(!files.length) return;
  let left = files.length;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      images.push({name:file.name, src:e.target.result});
      left--; if(left===0) render();
    };
    reader.readAsDataURL(file);
  });
}

function expandedImages(){
  const copies = Math.max(1, parseInt($('copies').value||1,10));
  const arr = [];
  images.forEach(img => { for(let i=0;i<copies;i++) arr.push(img); });
  return arr;
}

function render(){
  const cols = Math.max(1, parseInt($('cols').value||1,10));
  const rows = Math.max(1, parseInt($('rows').value||1,10));
  const perPage = cols * rows;
  const list = expandedImages();
  const pageCount = Math.max(1, Math.ceil(list.length / perPage));
  document.documentElement.style.setProperty('--fitMode',($('fitMode')?.value)||'contain');
  const pages = $('pages');
  pages.innerHTML = '';

  for(let p=0;p<pageCount;p++){
    const wrap = document.createElement('div');
    wrap.className = 'pageWrap';
    wrap.style.setProperty('--zoom', $('zoom').value);
    const num = document.createElement('div');
    num.className = 'pageNum';
    num.textContent = `第 ${p+1} / ${pageCount} 页`;
    const sheet = document.createElement('div');
    sheet.className = 'sheet';
    const page = document.createElement('div');
    page.className = 'a4' + ($('showBleed').checked ? ' bleed' : '');
    page.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    page.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    page.style.transform = `scale(${$('zoom').value})`;
    page.style.transformOrigin = 'top left';

    for(let i=0;i<perPage;i++){
      const item = list[p*perPage+i];
      const slot = document.createElement('div');
      slot.className = 'slot' + (item ? '' : ' empty');
      if(item){
        const img = document.createElement('img');
        img.src = item.src; img.alt = item.name;
        slot.appendChild(img);
      }
      page.appendChild(slot);
    }
    sheet.appendChild(page);
    wrap.appendChild(num); wrap.appendChild(sheet); pages.appendChild(wrap);
  }
  renderThumbs();
  $('stats').innerHTML = `原始图片：<b>${images.length}</b> 张<br>每张份数：<b>${Math.max(1, parseInt($('copies').value||1,10))}</b><br>A4 单页：<b>${cols} × ${rows} = ${perPage}</b> 张<br>总排版：<b>${list.length}</b> 张，<b>${pageCount}</b> 页`;
}

function renderThumbs(){
  const box = $('thumbGrid'); box.innerHTML = '';
  images.forEach((img,idx)=>{
    const div = document.createElement('div'); div.className='thumb';
    div.innerHTML = `<img src="${img.src}" alt=""><b>${idx+1}</b><button title="删除">×</button>`;
    div.querySelector('button').onclick = () => { images.splice(idx,1); render(); };
    box.appendChild(div);
  });
}

$('fileInput').addEventListener('change', e => readFiles(e.target.files));
['cols','rows','copies','zoom','showBleed','fitMode'].forEach(id => { const el=$(id); if(el) el.addEventListener('input', render); });

async function exportImageZip(){
  if(!images.length){
    alert('请先上传图片');
    return;
  }

  if(typeof JSZip === 'undefined'){
    alert('ZIP组件加载失败');
    return;
  }

  const cols = Math.max(1, parseInt($('cols').value||1,10));
  const rows = Math.max(1, parseInt($('rows').value||1,10));
  const list = expandedImages();
  const perPage = cols * rows;

  const zip = new JSZip();

  for(let p=0;p<Math.ceil(list.length/perPage);p++){

    const canvas = document.createElement('canvas');

    // 横向A4比例输出高清合图
    const width = 2480;
    const height = 3508;

    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,width,height);

    const cellW = width / cols;
    const cellH = height / rows;

    for(let i=0;i<perPage;i++){
      const item=list[p*perPage+i];
      if(!item) continue;

      const img=new Image();
      img.src=item.src;

      await new Promise(r=>{
        img.onload=r;
        img.onerror=r;
      });

      const x=(i%cols)*cellW;
      const y=Math.floor(i/cols)*cellH;

      const mode=$('fitMode')?$('fitMode').value:'contain';
      const scale=(mode==='cover'?Math.max:Math.min)(cellW/img.width, cellH/img.height);
      const w=img.width*scale;
      const h=img.height*scale;

      ctx.drawImage(
        img,
        x+(cellW-w)/2,
        y+(cellH-h)/2,
        w,h
      );
    }

    const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));

    zip.file(
      `A4_Page_${p+1}.png`,
      blob
    );
  }

  const result=await zip.generateAsync({type:'blob'});

  const a=document.createElement('a');
  a.href=URL.createObjectURL(result);
  a.download='A4_Image_Pages.zip';
  a.click();

  setTimeout(()=>{
    URL.revokeObjectURL(a.href);
  },1000);
}

$('printBtn').onclick = async () => {
  try{
    localStorage.setItem('a4_pdf_config', JSON.stringify({
      cols:$('cols').value,
      rows:$('rows').value,
      copies:$('copies').value,
      zoom:$('zoom').value,
      bleed:$('showBleed').checked
    }));
  }catch(e){}

  await Promise.all([...document.images].map(async img => {
    try{
      if(img.decode){
        await img.decode();
      }else if(!img.complete){
        await new Promise(resolve=>{
          img.addEventListener('load',resolve,{once:true});
          img.addEventListener('error',resolve,{once:true});
        });
      }
    }catch(e){}
  }));

  // 等待浏览器完成布局和图片绘制
  await new Promise(resolve=>setTimeout(resolve,300));

  window.print();
};
$('exportZipBtn').onclick = exportImageZip;
$('clearBtn').onclick = () => { images=[]; $('fileInput').value=''; render(); };
$('fitBtn').onclick = () => { $('zoom').value='0.45'; render(); };
$('actualBtn').onclick = () => { $('zoom').value='1'; render(); };

const drop = $('drop');
['dragenter','dragover'].forEach(ev => document.addEventListener(ev, e=>{e.preventDefault(); drop.classList.add('dragover');}));
['dragleave','drop'].forEach(ev => document.addEventListener(ev, e=>{e.preventDefault(); drop.classList.remove('dragover');}));
document.addEventListener('drop', e => readFiles(e.dataTransfer.files));
window.onafterprint = ()=>{
  document.body.style.display='block';
};

const savedConfig = localStorage.getItem('a4_pdf_config');
if(savedConfig){
  try{
    const cfg = JSON.parse(savedConfig);
    $('cols').value = cfg.cols;
    $('rows').value = cfg.rows;
    $('copies').value = cfg.copies;
    $('zoom').value = cfg.zoom;
    $('showBleed').checked = cfg.bleed;
  }catch(e){}
}

render();
window.addEventListener('error',e=>{
  if(e.message && e.message.includes('QuotaExceeded')){
    console.warn('localStorage容量不足，已忽略缓存');
  }
});
</script>
</body>
</html>
