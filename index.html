<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JX Home</title>

<style>
:root {
    --panel: rgba(255, 255, 255, 0.1);
    --panel-strong: rgba(255, 255, 255, 0.18);
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.72);
    --line: rgba(255, 255, 255, 0.34);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    color: var(--text);
    overflow: hidden;
    background:
        radial-gradient(circle at 18% 20%, rgba(255, 107, 107, 0.32), transparent 28%),
        radial-gradient(circle at 78% 18%, rgba(69, 220, 191, 0.28), transparent 30%),
        linear-gradient(-45deg, #13212a, #234b52, #25213d, #49284d);
    background-size: 150% 150%, 130% 130%, 400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%, 100% 0%, 0% 50%; }
    50% { background-position: 100% 50%, 0% 100%, 100% 50%; }
    100% { background-position: 0% 50%, 100% 0%, 0% 50%; }
}

.stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
}

.card {
    position: relative;
    z-index: 3;
    width: min(420px, calc(100vw - 48px));
    padding: 46px 42px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 18px;
    text-align: center;
    background: var(--panel);
    backdrop-filter: blur(15px);
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
    transition: transform 0.45s ease, background 0.45s ease;
}

.map-open .card {
    transform: scale(0.96);
    background: rgba(255, 255, 255, 0.08);
}

h1 {
    font-size: clamp(2.3rem, 8vw, 3rem);
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.typing {
    min-height: 1.5em;
    margin-bottom: 20px;
    color: var(--muted);
    font-size: 1.05rem;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 128px;
    min-height: 48px;
    margin-top: 14px;
    padding: 12px 24px;
    border: 0;
    border-radius: 999px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(45deg, #ff6b6b, #ffd166);
    box-shadow: 0 0 18px rgba(255, 107, 107, 0.55);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.btn:hover,
.btn:focus-visible {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 0 28px rgba(255, 107, 107, 0.9);
    outline: none;
}

.mind-map {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
}

.map-line {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--distance);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
    transform: rotate(var(--angle));
    transform-origin: left center;
    opacity: 0;
    transition: opacity 0.35s ease;
}

.project-node {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(210px, 43vw);
    min-height: 78px;
    padding: 14px 16px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    color: white;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.13);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.72);
    transition:
        transform 0.52s cubic-bezier(.18, .9, .2, 1.2),
        opacity 0.35s ease,
        background 0.25s ease,
        border-color 0.25s ease;
}

.project-node::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    border-radius: 8px 0 0 8px;
    background: var(--accent);
}

.project-node strong,
.project-node span {
    display: block;
    padding-left: 6px;
}

.project-node strong {
    margin-bottom: 6px;
    font-size: 1rem;
}

.project-node span {
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.45;
}

.project-node:hover,
.project-node:focus-visible {
    background: var(--panel-strong);
    border-color: rgba(255, 255, 255, 0.42);
    outline: none;
}

.map-open .mind-map {
    pointer-events: auto;
}

.map-open .map-line {
    opacity: 1;
}

.map-open .project-node {
    opacity: 1;
    pointer-events: auto;
    transform:
        translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
        rotate(var(--tilt))
        scale(1);
    animation: breathe 4.5s ease-in-out infinite;
    animation-delay: var(--delay);
}

@keyframes breathe {
    0%, 100% {
        margin-top: 0;
    }
    50% {
        margin-top: -8px;
    }
}

.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: white;
    opacity: 0.5;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

footer {
    position: absolute;
    bottom: 20px;
    z-index: 4;
    width: 100%;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
}

@media (max-width: 720px) {
    body {
        overflow: auto;
    }

    .stage {
        min-height: 100vh;
        height: auto;
        padding: 36px 18px 78px;
        align-content: start;
        gap: 24px;
    }

    .card {
        width: min(100%, 390px);
        padding: 38px 28px;
    }

    .mind-map {
        position: relative;
        display: none;
        grid-template-columns: 1fr;
        gap: 12px;
        width: min(100%, 390px);
        pointer-events: auto;
    }

    .map-open .mind-map {
        display: grid;
    }

    .map-line {
        display: none;
    }

    .project-node,
    .map-open .project-node {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        opacity: 0;
        transform: translateY(12px) scale(0.98);
        pointer-events: none;
        animation: none;
    }

    .map-open .project-node {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
    }
}


/* 点击进入后：一列铺满屏幕，超出高度自动换到下一列 */
.map-open .card {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.94);
}

.mind-map {
    position: absolute;
    inset: 24px;
    z-index: 5;
    display: none;
    flex-direction: column;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 14px;
    padding: 20px;
    overflow-x: auto;
    overflow-y: hidden;
    pointer-events: none;
}

.map-open .mind-map {
    display: flex;
    pointer-events: auto;
}

.map-line {
    display: none !important;
}

.project-node,
.map-open .project-node {
    position: relative;
    left: auto;
    top: auto;
    width: min(280px, calc(100vw - 88px));
    min-height: 82px;
    opacity: 1;
    pointer-events: auto;
    transform: none;
    animation: none;
}

.project-node:hover,
.project-node:focus-visible {
    transform: translateY(-2px);
}

@media (max-width: 720px) {
    .stage {
        height: 100vh;
        min-height: 100vh;
        padding: 18px;
        display: grid;
        place-items: center;
    }

    .mind-map,
    .map-open .mind-map {
        position: absolute;
        inset: 14px;
        display: none;
        width: auto;
        grid-template-columns: none;
        flex-direction: column;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 12px;
        padding: 12px;
        overflow-x: auto;
        overflow-y: hidden;
    }

    .map-open .mind-map {
        display: flex;
    }

    .project-node,
    .map-open .project-node {
        width: min(240px, calc(100vw - 52px));
        opacity: 1;
        transform: none;
        pointer-events: auto;
    }
}



/* 返回按钮：进入项目列表后显示 */
.back-btn {
    position: fixed;
    left: 24px;
    top: 24px;
    z-index: 10;
    min-width: 104px;
    min-height: 42px;
    margin-top: 0;
    padding: 10px 18px;
    background: linear-gradient(45deg, #6c757d, #adb5bd);
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
}

.back-btn[hidden] {
    display: none;
}

.map-open footer {
    display: none;
}

@media (max-width: 720px) {
    .back-btn {
        left: 14px;
        top: 14px;
        min-width: 92px;
        min-height: 38px;
        padding: 8px 14px;
        font-size: 14px;
    }

    .map-open .mind-map {
        top: 64px;
    }
}

</style>
</head>

<body>
<main class="stage" id="stage">
    <section class="card">
        <h1>JX SPACE</h1>
        <div class="typing" id="typing"></div>
        <button class="btn" id="enterBtn" type="button" aria-expanded="false" aria-controls="mindMap">
            🚀 进入
        </button>
    </section>

    <nav class="mind-map" id="mindMap" aria-label="项目导航"></nav>

    <button class="btn back-btn" id="backBtn" type="button" hidden>← 返回</button>
</main>

<footer>
    © 2026 Juhnxu
</footer>

<script>
const text = "探索 · 创造 · 构建未来";
const typingEl = document.getElementById("typing");
const stage = document.getElementById("stage");
const enterBtn = document.getElementById("enterBtn");
const backBtn = document.getElementById("backBtn");
const mindMap = document.getElementById("mindMap");

// 后续新增项目时，只需要在这里追加一项。
const projectLinks = [
    {
        title: "JX Cut",
        desc: "视频剪辑与创作工具",
        url: "https://juhnxu.github.io/jx_cut/",
        accent: "#ff6b6b"
    },
    {
        title: "GitHub",
        desc: "主页",
        url: "https://github.com/JuhnXu",
        accent: "#45dcbf"
    },
    {
        title: "PDF",
        desc: "PDF拆解",
        url: "./pdf-to-images.html",
        accent: "#ffd166"
    },
    {
        title: "PDF",
        desc: "PDF合成",
        url: "https://juhnxu.github.io/jx_cut/pdf.html",
        accent: "#ffd166"
    },
    {
        title: "Gallery",
        desc: "单页连续阅读图片",
        url: "https://juhnxu.github.io/jx_cut/gallery.html",
        accent: "#9b8cff"
    },
    {
        title: "ironsworn-battle-sim",
        desc: "模拟铁誓战斗",
        url: "./battle-sim.html",
        accent: "#9b8cff"
    },
    {
        title: "office-viewer-site",
        desc: "在线打开文档",
        url: "./office-viewer-site.html",
        accent: "#9b8cff"
    },
    {
        title: "DND-battle-sim",
        desc: "模拟DND战斗",
        url: "https://juhnxu.github.io/dnd_test",
        accent: "#9b8cff"
    },
    {
        title: "png,jpg,compress",
        desc: "压缩图片",
        url: "./png_compress.html",
        accent: "#9b8cff"
    },
    {
        title: "gloomhaven_card_generator",
        desc: "幽港迷城生成",
        url: "./gh_jx/index.html",
        accent: "#9b8cff"
    },
    {
        title: "pinyin",
        desc: "拼音工具",
        url: "./py/index.html",
        accent: "#9b8cff"
    },
    {
        title: "dice_simple",
        desc: "简易骰子",
        url: "./dice_simple/index.html",
        accent: "#9b8cff"
    },
    {
        title: "TTS",
        desc: " JSON 资源下载器",
        url: "./tts_asset_downloader_web.html",
        accent: "#9b8cff"
    },
    {
        title: "md_make",
        desc: "读取本地目录生成md",
        url: "./image_md_generator_pagebreak.html",
        accent: "#9b8cff"
    }
// jx
];

let typingIndex = 0;
function typing() {
    if (typingIndex < text.length) {
        typingEl.textContent += text.charAt(typingIndex);
        typingIndex++;
        setTimeout(typing, 80);
    }
}

function buildMindMap() {
    mindMap.innerHTML = "";

    projectLinks.forEach((project) => {
        const node = document.createElement("a");
        node.className = "project-node";
        node.href = project.url;
        node.target = "_blank";
        node.rel = "noopener noreferrer";
        node.style.setProperty("--accent", project.accent);
        node.innerHTML = `<strong>${project.title}</strong><span>${project.desc}</span>`;
        mindMap.appendChild(node);
    });
}

enterBtn.addEventListener("click", () => {
    stage.classList.add("map-open");
    enterBtn.setAttribute("aria-expanded", "true");
    backBtn.hidden = false;
});

backBtn.addEventListener("click", () => {
    stage.classList.remove("map-open");
    enterBtn.setAttribute("aria-expanded", "false");
    backBtn.hidden = true;
});

window.addEventListener("resize", buildMindMap);

typing();
buildMindMap();

for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
}
</script>
</body>
</html>
